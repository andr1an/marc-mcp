name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25"
  BINARY_NAME: "marc-mcp"

jobs:
  go-tests:
    name: Tests (Go) / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: make build

      - name: Test
        run: make test

  nix-tests:
    name: Tests (Nix) / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build with Nix
        run: nix build

      - name: Run Nix flake checks
        run: nix flake check --print-build-logs

  build-binaries:
    name: Build release binaries / ${{ matrix.os }}-${{ matrix.goarch }}
    needs: [go-tests, nix-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
          - os: ubuntu-24.04-arm
            goarch: arm64
          - os: macos-13
            goarch: amd64
          - os: macos-14
            goarch: arm64
          - os: windows-latest
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build native target
        run: |
          make clean
          make build VERSION="${GITHUB_REF_NAME}" COMMIT="${GITHUB_SHA}"

      - name: Prepare dist
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          OS="$(go env GOOS)"
          ARCH="$(go env GOARCH)"
          if [ "$ARCH" != "${{ matrix.goarch }}" ]; then
            echo "Runner GOARCH ($ARCH) does not match matrix.goarch (${{ matrix.goarch }})"
            exit 1
          fi
          OUT="${BINARY_NAME}-${OS}-${ARCH}"
          if [ "$OS" = "windows" ]; then
            OUT="${OUT}.exe"
            BIN="${BINARY_NAME}.exe"
          else
            BIN="${BINARY_NAME}"
          fi

          mkdir -p "dist/${VERSION}"
          mv "${BIN}" "dist/${VERSION}/${OUT}"
          ls -lah "dist/${VERSION}"

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.os }}-${{ matrix.goarch }}
          path: dist/${{ github.ref_name }}/${{ env.BINARY_NAME }}-*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist

      - name: Flatten + checksums
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p out

          find release-dist -type f -print0 | xargs -0 -I{} cp "{}" out/
          cd out
          sha256sum * > "checksums_${VERSION}.txt"
          ls -lah

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
